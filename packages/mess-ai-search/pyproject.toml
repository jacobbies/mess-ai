[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mess"]

[project]
name = "mess-ai-search"
version = "0.1.0"
description = "Lightweight search/runtime distribution for MESS-AI"
requires-python = ">=3.11"
readme = "README.md"
authors = [
    { name = "Jacob Bieschke" }
]
dependencies = [
    "numpy>=1.26,<3",
    "PyYAML>=6.0",
    "faiss-cpu>=1.7",
    "boto3>=1.34",
]
